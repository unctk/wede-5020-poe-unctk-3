<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Enquire about volunteering, becoming a sponsor, or partnering with New Leaders Foundation to help transform South African education.">
    <meta name="keywords" content="NLF enquiry, volunteering, sponsor, partner, CSI, educationNPO, New Leaders Foundation">
    <meta name="author" content="New Leaders Foundation">
    <title>Enquiry - New Leaders Foundation</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!--Header is identical on all pages. -->
    <header>
        <a href="index.html" class="logo">
            <span class="logo-badge">NLF</span>
            <span class="logo-name">New Leaders Foundation</span>
        </a>
        <nav aria-label="Main navigation">
            <ul class="nav-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="services.html">Programmes</a></li>
                <li><a href="enquiry.html" class="active">Enquiry</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- A page banner is used on all inner pages. -->
        <section class="page banner#">
            <h1>Get Involved</h1>
            <p>Fill out the form below and our team will get back to you as soon as possible.</p>

            <form action="#" method="post">

                    <label for "name">Name:</label>
                    <input type "text" id "name" name "name" required>

                    <label for "email">Email:</label>
                    <input type "email" id "email" name "email" required>

                    <label for "message">Message:</label>
                    <textarea id "message" name "message" rows "5" required></textarea>

                <button type "submit">Submit Enquiry</button>
            </form>
        </section>
    </main>

    <!-- Footer content -->
    <footer>
        <!-- Footer content goes here -->
    </footer>

</body>
</html>
